name: Release

on:
  push:
    branches: [main]
    paths:
      - package.json

permissions:
  contents: write       # create tags + GitHub releases

jobs:
  release:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0        # full history needed to detect existing tags

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.pkg.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.tag_check.outputs.exists == 'false'
        uses: pnpm/action-setup@v5
        with:
          run_install: false

      - name: Setup Node (with npm registry auth)
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm typecheck

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm build

      - name: Test
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm test

      - name: Publish to npm
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.pkg.outputs.tag }}"
          git push origin "${{ steps.pkg.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          name: ${{ steps.pkg.outputs.tag }}
          generate_release_notes: true
          make_latest: true
